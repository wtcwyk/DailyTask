name: Build Android APK

# 触发条件：允许我们在网页上手动点击按钮触发编译
on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest # 使用最新的 Ubuntu 云服务器

    steps:
      # 1. 从你的仓库里获取刚才上传的代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装 Java 环境（安卓编译必需）
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # 目前大多数安卓项目使用 Java 17

      # 3. 赋予 Gradle 编译脚本“可执行”的权限
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 4. 核心步骤：开始编译生成无需配置签名的 Debug 版 APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. 打包完成：把生成的 APK 提取出来，放到网页上供你下载
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DailyTask-App-File # 你最终下载下来的压缩包名字
          path: app/build/outputs/apk/debug/*.apk # 系统在这个路径下去找生成的 APK 文件
